services:
  mysql:
    image: mysql:8.0
    container_name: smart-research-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-smart_research}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppass}
    volumes:
      - smart-research-mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  smart-research:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-research-class
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8989:80"
    volumes:
      - smart-research-logs:/app/logs
      - smart-research-backups:/app/backups
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-appuser}
      - DB_PASSWORD=${DB_PASSWORD:-apppass}
      - DB_NAME=${DB_NAME:-smart_research}
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-to-a-strong-random-key}
      - JWT_EXPIRES_IN=7d
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  smart-research-mysql-data:
    driver: local
  smart-research-logs:
    driver: local
  smart-research-backups:
    driver: local
